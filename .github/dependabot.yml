version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk minor/patch bumps into a single PR.
      nuget-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
    open-pull-requests-limit: 10
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
