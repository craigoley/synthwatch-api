name: Dependency scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, off-peak: Mondays 05:47 UTC.
    - cron: '47 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vulnerable-packages:
    name: dotnet list package --vulnerable
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Check for vulnerable packages (incl. transitive)
        run: |
          set -euo pipefail
          # Native NuGet vulnerability audit (GitHub Advisory DB), full transitive closure.
          dotnet list package --vulnerable --include-transitive --format json > vuln.json
          cat vuln.json
          count=$(jq '[.projects[]?.frameworks[]?.topLevelPackages[]?, .projects[]?.frameworks[]?.transitivePackages[]?] | length' vuln.json)
          echo "Vulnerable packages found: $count"
          if [ "$count" -gt 0 ]; then
            echo "::error::Found $count vulnerable package(s). See the JSON output above."
            exit 1
          fi
