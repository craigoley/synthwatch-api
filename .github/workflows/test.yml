name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (xUnit + Testcontainers Postgres)
    runs-on: ubuntu-latest # GitHub-hosted runners include Docker, so Testcontainers works
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      # Runs the full suite: pure validation/mapping/SLA tests + the Testcontainers-backed
      # integration tests (real postgres:16 seeded with the runner schema). A failing test fails
      # the job, which (as a required PR check) blocks merge — the regression gate the API lacked.
      - name: Test
        run: dotnet test tests/SynthWatch.Api.Tests/ -c Release
