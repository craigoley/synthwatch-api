name: Deploy API to Azure Functions

# Build and deploy the .NET 10 isolated Function App (Flex Consumption, synthwatch-api in
# synthwatch-rg / eastus2) on merge to main. Authentication is OIDC (azure/login federated
# credential) — NO Azure secrets are stored in the repo; only the non-sensitive
# client/tenant/subscription IDs are repo variables.
on:
  # Token-free auto-deploy after a hands-free auto-merge. A native auto-merge merges via the default
  # GITHUB_TOKEN, and GitHub SUPPRESSES push-triggered workflows from GITHUB_TOKEN events — so the
  # old `on: push: main` never fired Deploy after an auto-merge. The CodeQL code-scanning workflow
  # ("Code Quality: Push on main", event=dynamic) is GitHub-managed, runs on EVERY merge to main
  # (incl. GITHUB_TOKEN merges), and is NOT suppressed — evidence: it ran on every auto-merge commit
  # while all `on: push` workflows were suppressed. Chain Deploy off it via workflow_run (also not
  # suppressed) so Deploy auto-fires with no PAT/secret. (Both CodeQL workflows are named "CodeQL";
  # matching by name catches the dynamic one that survives GITHUB_TOKEN merges.) workflow_dispatch
  # stays as the manual fallback.
  workflow_run:
    workflows: ["CodeQL"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Serialize deploys to main; a newer deploy cancels an in-flight older one so two pushes can't
# race back-to-back (the 2026-06-22 incident: queued deploys ran 18s apart).
concurrency:
  group: deploy-main
  cancel-in-progress: true

# Least privilege: id-token to mint the OIDC token for azure/login, read to checkout.
permissions:
  id-token: write
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: synthwatch-api
  DOTNET_VERSION: '10.0.x'
  PUBLISH_DIR: ./publish_output

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Deploy only on a manual dispatch, or when the upstream CodeQL run on main SUCCEEDED (a real
    # merge whose CI passed — the PR could not have auto-merged otherwise). Never deploy off a
    # failed/cancelled CodeQL run.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # For workflow_run, deploy the exact commit CodeQL ran on (the merge commit); for a manual
          # dispatch, the default ref (main HEAD).
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Build the prebuilt publish output the deploy step uploads (no remote/Oryx build).
      - name: Publish (.NET 10 isolated, Release)
        run: dotnet publish -c Release -o ${{ env.PUBLISH_DIR }}

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Reconcile critical config so a code-only deploy or a manual change can't silently drop it
      # (the 2026-06-22 CORS outage: siteConfig.cors lived in Bicep but CD never re-asserted it).
      # SAFE BY DESIGN — non-destructive AND non-blocking: CORS is reconciled ADDITIVELY (ensure
      # required origins are present; never remove one, so a deliberately-added preview origin is
      # preserved); missing app settings only WARN; and continue-on-error means a transient Azure
      # read can never gate the code deploy. So this guard cannot itself become an outage source.
      # A FAILED read => skip + warn (never misreported as "everything missing"). Reuses azure/login.
      - name: Reconcile critical config (CORS) + drift check
        continue-on-error: true
        env:
          REQUIRED_CORS_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          RG: synthwatch-rg
        run: |
          set -uo pipefail   # NOT -e: a transient az read must not abort the job / block deploy
          APP="$AZURE_FUNCTIONAPP_NAME"

          # --- CORS: ensure each required origin is present (additive; restores drift) ---
          if [ -z "${REQUIRED_CORS_ORIGINS:-}" ]; then
            echo "::warning::CORS_ALLOWED_ORIGINS repo variable is not set — skipping CORS reconcile."
          elif ! current="$(az functionapp cors show -g "$RG" -n "$APP" --query "allowedOrigins" -o tsv)"; then
            # Read FAILED (az non-zero) — skip rather than misreport every origin as missing.
            echo "::warning::could not read live CORS (transient Azure error) — skipping reconcile this run."
          else
            # current is newline-separated (empty string => genuinely zero origins, which we DO restore).
            echo "Current CORS origins: $(echo "$current" | paste -sd, -)"
            IFS=',' read -ra want <<< "$REQUIRED_CORS_ORIGINS"
            for raw in "${want[@]}"; do
              o="$(echo "$raw" | xargs)"; [ -z "$o" ] && continue
              if grep -qxF "$o" <<< "$current"; then
                echo "  present: $o"
              else
                echo "::warning::CORS origin '$o' was MISSING — restoring it (drift reconciled)."
                az functionapp cors add -g "$RG" -n "$APP" --allowed-origins "$o" \
                  || echo "::warning::failed to restore CORS origin '$o' — needs manual fix."
              fi
            done
            # Invariant: CORS must never be "*". Warn (don't remove) if an over-permissive origin appears.
            if grep -qxF '*' <<< "$current"; then
              echo "::warning::live CORS contains '*' — this must never be wildcard; remove it manually."
            fi
          fi

          # --- App settings: WARN (never fail/mutate) if a critical setting is absent ---
          if names="$(az functionapp config appsettings list -g "$RG" -n "$APP" --query "[].name" -o tsv)"; then
            for key in AzureWebJobsStorage__accountName APPLICATIONINSIGHTS_CONNECTION_STRING \
                       Postgres__Host Postgres__Database Postgres__Username; do
              if grep -qxF "$key" <<< "$names"; then echo "  present: $key"
              else echo "::warning::critical app setting MISSING: $key"; fi
            done
          else
            echo "::warning::could not read app settings (transient Azure error) — skipping drift check this run."
          fi

          {
            echo "### Config reconcile"
            echo "- CORS origins now: $(az functionapp cors show -g "$RG" -n "$APP" --query "join(', ', allowedOrigins)" -o tsv 2>/dev/null || echo '(read failed)')"
          } >> "$GITHUB_STEP_SUMMARY"

      # functions-action uses the azure/login (RBAC) session — no publish profile/secret.
      # v1.5.x supports Flex Consumption + dotnet-isolated.
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1.5.6
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PUBLISH_DIR }}

      - name: Deployment summary
        run: |
          {
            echo "### API deployed"
            echo ""
            echo "- **Function App:** \`${{ env.AZURE_FUNCTIONAPP_NAME }}\` (Flex Consumption, synthwatch-rg / eastus2)"
            echo "- **Runtime:** .NET 10 isolated"
            echo "- **Commit:** \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
