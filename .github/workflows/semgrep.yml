name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, off-peak: Mondays 05:17 UTC.
    - cron: '17 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Install via pipx (preinstalled on ubuntu-latest, glibc) rather than the Alpine
      # semgrep container — JS actions like upload-sarif can't run node under musl.
      - name: Install Semgrep
        run: pipx install semgrep==1.167.0

      - name: Run Semgrep (SARIF)
        # Findings should surface in code scanning, not hard-fail the build.
        continue-on-error: true
        run: >-
          semgrep scan
          --config p/default
          --config p/security-audit
          --config p/csharp
          --sarif --output semgrep.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
