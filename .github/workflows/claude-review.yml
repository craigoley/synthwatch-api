name: Claude Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  claude-review:
    name: Claude review
    runs-on: ubuntu-latest
    # Skip Dependabot PRs. Note: implementation PRs here may be authored by the cao825
    # account (the human operator) — that is NOT excluded; only the bot is.
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Claude review
        id: review
        uses: anthropics/claude-code-action@558b1d6cab4085c7753fe402c10bef0fbb92ac7a # v1
        env:
          # Authenticate the `gh` CLI used by the Bash tool (gh pr merge/comment).
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The action blocks ALL bot actors by default (checkHumanActor). Allow ONLY
          # github-actions[bot] so legitimate re-triggers (a close+reopen, or any
          # github-actions-initiated run) pass the guard. NOT '*': every other bot —
          # including dependabot[bot], also excluded at the job `if:` above — stays
          # blocked. (Matching is case-insensitive and strips the [bot] suffix.)
          allowed_bots: "github-actions[bot]"
          # Force tag mode on these PR events so the action creates a tracking comment
          # AND wires the GitHub comment + inline-comment MCP tools; the review summary
          # is then posted automatically as Claude's final message.
          track_progress: true
          # --allowedTools MUST be a single QUOTED value. claude_args is parsed with
          # shell-quote, which splits on UNQUOTED whitespace (it escapes () but not
          # spaces). So any tool pattern containing a space — Bash(gh pr:*),
          # Bash(gh api:*) — gets shredded into invalid fragments ("Bash(gh", "pr:*)",
          # ...) and silently dropped, which was the root cause of the earlier no-op:
          # gh pr comment/merge were never allowed. Wrapping the whole comma-list in
          # double quotes keeps it one token; the action then comma-splits it, so each
          # pattern survives intact.
          # --model belongs in claude_args (there is no valid top-level --model input).
          claude_args: |
            --model claude-opus-4-8
            --max-turns 50
            --allowedTools "Edit,Write,Read,Bash(git:*),Bash(gh pr:*),Bash(gh api:*),Bash(dotnet:*),mcp__github_inline_comment__create_inline_comment"
          prompt: |
            You are reviewing a pull request for the SynthWatch API: a C# / .NET 10
            isolated-worker Azure Functions HTTP API (ASP.NET Core integration) that is the
            single data API over the system's Azure Postgres database. Review the PR diff and
            post specific, actionable inline comments using the inline-comment tool. Be
            concise; do not rubber-stamp. Prioritize this repo's hard invariants:

            1. Managed-identity DB auth — the Npgsql connection string must carry only
               host/database/username and NEVER a password. A password (or any secret) in the
               connection string silently disables the managed-identity token and is a bug.
            2. Read-mostly EF Core — this API does NOT own the schema and must NOT add EF
               migrations or mutate the schema. The only writes are checks CRUD. Flag any
               migration, EnsureCreated, or DDL.
            3. Flex Consumption target — infra must stay on the Flex Consumption plan
               (FC1 / FlexConsumption); .NET 10 cannot run on Linux Consumption. Flag changes
               that move it to another plan or a non-isolated worker.
            4. Schema fidelity — entities/columns must match the runner-owned ground truth in
               craigoley/synthwatch docs/SCHEMA.md exactly (table/column names, bigint -> long,
               identity columns ValueGeneratedOnAdd, status taxonomies pass/fail and
               open/resolved). Flag drift.
            5. CORS — must be scoped to a single configurable origin, never "*".

            Also check: input validation and proper status codes, that DB exceptions are not
            leaked to clients, async/cancellation correctness, and that the build stays clean
            (no new analyzer warnings; CI builds with -warnaserror). Verify locally with
            `dotnet build -c Release -warnaserror` when useful.

            How to report and resolve (use GitHub, NOT chat):
              - Provide your overall summary (verdict + key findings, or an explicit
                "no issues found") as your final message; it is posted as the PR
                (tracking) comment automatically.
              - Post actionable findings as inline comments. If the PR author asks you to,
                you may commit fixes to the PR branch (verify with
                `dotnet build -c Release -warnaserror`).
              - Do NOT merge. Merging is deterministic (the separate Auto-merge workflow, gated to
                trusted authors via GitHub native auto-merge). You do NOT run `gh pr merge`.

            ★ VERDICT — the LAST line of your final message MUST be exactly:
              REVIEW_VERDICT: <DECISION>
            where you replace <DECISION> with the single literal word BLOCK or the single literal word
            PASS — nothing else on that line, nothing after it. (This instruction uses the <DECISION>
            placeholder ON PURPOSE so the prompt itself contains no literal verdict the gate could
            mis-parse; emit the real word.) This line gates the merge (the "Claude review" check fails
            on BLOCK, holding the merge; passes on PASS). Be CONSERVATIVE — choose BLOCK ONLY for a
            real, confident correctness bug, security issue, data loss, or breaking change. EVERYTHING
            else is PASS: style, naming, nits, suggestions, "consider…", or speculative concerns still
            post as comments but do NOT block. If unsure, choose PASS. Never block on advisory nits.

      # ★ LAYER 2 — findings gate (UNION-SOURCE, the reference for all repos). Take the LAST
      # `REVIEW_VERDICT:` line across the UNION of every place Claude's final message can carry it:
      #   (a) execution_file — result entries + assistant text blocks (the runner's verdict lands here)
      #   (b) Claude's posted PR comments + review bodies (THIS repo's verdict landed here, NOT in
      #       execution_file's .result — live-proven on #57). Neither source alone is universal.
      # The user/prompt message is NOT in any parsed source (jq selects only result/assistant; comments
      # & reviews are Claude's output) AND the prompt uses a <DECISION> placeholder, so the prompt's
      # text can never be mis-parsed as a verdict. BLOCK => exit 1 => the "Claude review" check fails
      # => native auto-merge holds. PASS => succeed. FAIL-OPEN: NO source yields a verdict (a no-op or
      # errored review) => PASS + ::warning:: (a transient LLM hiccup must never deadlock merge; Layer 1
      # already required the review to RUN). Check-run name is the job name ("Claude review") —
      # unchanged, so the Layer-1 required context matches. `if: always()` so it decides even on error.
      - name: Gate merge on review verdict
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.review.outputs.execution_file }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          # The verdict lives in Claude's FINAL message — but WHICH source carries it diverges by repo
          # (proved live): the runner's lands in execution_file `.result`; this repo's #55 landed in the
          # posted COMMENT, NOT in `.result` (a 443-char summary). So parse the UNION of every place the
          # final message can appear and take the LAST REVIEW_VERDICT: execution_file (result entries +
          # assistant text blocks) PLUS Claude's posted comments + review bodies. None of these include
          # the user/prompt (which quotes example verdicts), so the last match is Claude's real verdict.
          file_text=""
          if [ -n "${EXECUTION_FILE:-}" ] && [ -f "$EXECUTION_FILE" ]; then
            file_text=$(jq -rs '[ (.. | objects | select(.type=="result") | .result? | strings),
                                  (.. | objects | select(.type=="assistant") | (.message?.content? // [])[]? | select(.type=="text") | .text) ]
                                | join("\n")' "$EXECUTION_FILE" 2>/dev/null || echo "")
          fi
          posted=$(gh pr view "$PR" --json comments \
            -q '[.comments[] | select(.author.login | ascii_downcase | test("claude")) | .body] | join("\n")' 2>/dev/null || echo "")
          posted_reviews=$(gh api "repos/$GH_REPO/pulls/$PR/reviews" \
            -q '[.[] | select(.user.login | ascii_downcase | test("claude")) | .body] | join("\n")' 2>/dev/null || echo "")
          verdict=$(printf '%s\n%s\n%s\n' "$file_text" "$posted" "$posted_reviews" \
            | grep -oiE 'REVIEW_VERDICT:[[:space:]]*(BLOCK|PASS)' | tail -1 | grep -oiE '(BLOCK|PASS)' | tr '[:lower:]' '[:upper:]' || true)
          [ -z "$verdict" ] && verdict='<none>'
          echo "[review] exec_file_len=${#file_text} comment_len=${#posted} review_len=${#posted_reviews} parsed_verdict='$verdict'"
          if [ "$verdict" = "BLOCK" ]; then
            echo "::error::Claude review verdict: BLOCK — a blocking finding holds this merge until resolved."
            exit 1
          fi
          if [ "$verdict" = "PASS" ]; then
            echo "[review] verdict PASS — merge may proceed."
            exit 0
          fi
          echo "::warning::[review] no verdict parsed — failing open to PASS (an LLM hiccup must not deadlock merge)."
          exit 0
