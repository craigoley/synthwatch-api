name: Auto-merge

# Hands-free merge for TRUSTED authors only. This is a PUBLIC repo that DEPLOYS to Azure on merge
# to main, so merge authorization is a security property: checks passing is necessary but NOT
# sufficient — the author must be on the trusted allowlist below. Untrusted authors' PRs are never
# auto-merged here, no matter how green their checks are (this job simply does not run for them).
#
# Mechanism: GitHub *native* auto-merge (`gh pr merge --auto`). Unlike an immediate merge, --auto
# tells GitHub to HOLD the merge until every required status check passes — so it cooperates with
# branch protection (the required "Test / Test (xUnit + Testcontainers Postgres)" check) instead of
# racing/failing it. Requires repo setting allow_auto_merge=true.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge (trusted authors)
    runs-on: ubuntu-latest
    # ★ TRUST GATE (hard, deterministic — NOT an LLM decision). Only the operator (craigoley /
    # cao825), the agent (craigoleyagent), and dependabot[bot] may auto-merge. Any other author ->
    # this job is skipped -> their PR NEVER auto-merges. dependabot is allowed here even though it is
    # review-skipped in claude-review.yml (low-value to review, safe to auto-merge once checks pass).
    if: contains(fromJSON('["craigoley", "cao825", "craigoleyagent", "dependabot[bot]"]'), github.event.pull_request.user.login)
    steps:
      - name: Enable native auto-merge (waits for required checks)
        env:
          # Prefer AUTOMERGE_TOKEN (a fine-grained PAT or GitHub App token with contents +
          # pull-requests write) so the eventual merge is attributed to a real identity and the
          # post-merge push TRIGGERS the Deploy workflow. With the default GITHUB_TOKEN, GitHub
          # suppresses workflow runs caused by the token, so an auto-merged code change would NOT
          # auto-deploy. Falls back to GITHUB_TOKEN (auto-merge still works; deploy must then be
          # run manually for code changes). See repo setting: add the AUTOMERGE_TOKEN secret.
          GH_TOKEN: ${{ secrets.AUTOMERGE_TOKEN || secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash --delete-branch "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"
