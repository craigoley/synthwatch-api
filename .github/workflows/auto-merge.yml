name: Auto-merge

# Hands-free merge for TRUSTED authors only. This is a PUBLIC repo that DEPLOYS to Azure on merge
# to main, so merge authorization is a security property: checks passing is necessary but NOT
# sufficient — the author must be on the trusted allowlist below. Untrusted authors' PRs are never
# auto-merged here, no matter how green their checks are (this job simply does not run for them).
#
# Mechanism: GitHub *native* auto-merge (`gh pr merge --auto`). Unlike an immediate merge, --auto
# tells GitHub to HOLD the merge until every required status check passes — so it cooperates with
# branch protection (the required "Test / Test (xUnit + Testcontainers Postgres)" check) instead of
# racing/failing it. Requires repo setting allow_auto_merge=true.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  actions: write # to dispatch the Deploy workflow (workflow_dispatch) after the merge

jobs:
  auto-merge:
    name: Auto-merge (trusted authors)
    runs-on: ubuntu-latest
    timeout-minutes: 20 # caps the post-merge wait (poll-until-merged below)
    # One poller per PR: a new push cancels the previous run so we don't stack waiters.
    concurrency:
      group: auto-merge-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    # ★ TRUST GATE (hard, deterministic — NOT an LLM decision). BOTH conditions are required: the PR's
    # base branch must be `main`, AND the author must be on the allowlist — only the operator (craigoley /
    # cao825), the agent (craigoleyagent), and dependabot[bot] may auto-merge. Any other author, OR any base
    # other than main -> this job is skipped -> their PR NEVER auto-merges. dependabot is allowed here even
    # though it is review-skipped in claude-review.yml (low-value to review, safe to auto-merge once checks pass).
    # base==main closes the July-4 stacking hole: a stacked PR based on an UNPROTECTED feature branch would otherwise auto-merge there with no required checks (runner #192).
    if: github.event.pull_request.base.ref == 'main' && contains(fromJSON('["craigoley", "cao825", "craigoleyagent", "dependabot[bot]"]'), github.event.pull_request.user.login)
    steps:
      - name: Enable native auto-merge (waits for required checks)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash --delete-branch "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"

      # Token-free auto-deploy: the merge above is performed via GITHUB_TOKEN, and GitHub SUPPRESSES
      # push-triggered workflows from GITHUB_TOKEN events — so Deploy's `on: push` won't fire. Wait
      # for the merge, then DISPATCH Deploy. workflow_dispatch is the documented EXCEPTION that
      # GITHUB_TOKEN can still trigger, so this needs no PAT/secret. Bails out cheaply if CI fails
      # (no merge will happen) or the PR is closed unmerged.
      - name: Auto-deploy after merge (token-free workflow_dispatch)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This job has no checkout, so gh can't infer the repo from a git remote — set it
          # explicitly (GH_REPO) so `gh pr view` / `gh workflow run` resolve without --repo.
          GH_REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          # Only dispatch Deploy when the PR touched deploy-relevant paths (mirrors deploy.yml's
          # push `paths` filter: .cs/.csproj/host.json/deploy.yml) — a docs/workflow-only merge
          # shouldn't redeploy. Matches the runner repo's auto-merge dispatch gating.
          FILES=$(gh pr view "$PR" --json files -q '.files[].path' 2>/dev/null || echo "")
          if ! printf '%s\n' "$FILES" | grep -qE '(\.cs|\.csproj)$|(^|/)host\.json$|^\.github/workflows/deploy\.yml$'; then
            echo "No deploy-relevant changes in PR #$PR — not dispatching Deploy."
            exit 0
          fi
          for _ in $(seq 1 60); do
            state=$(gh pr view "$PR" --json state -q .state 2>/dev/null || echo "")
            if [ "$state" = "MERGED" ]; then
              echo "PR #$PR merged -> dispatching Deploy (workflow_dispatch, token-free)"
              gh workflow run deploy.yml --ref main
              exit 0
            fi
            if [ "$state" = "CLOSED" ]; then echo "PR #$PR closed unmerged -> no deploy"; exit 0; fi
            concl=$(gh pr view "$PR" --json statusCheckRollup \
              -q '[.statusCheckRollup[]? | select(.name=="Test (xUnit + Testcontainers Postgres)")][-1].conclusion // ""' \
              2>/dev/null || echo "")
            if [ "$concl" = "FAILURE" ] || [ "$concl" = "CANCELLED" ]; then
              echo "Test concluded $concl -> PR won't merge -> no deploy"; exit 0
            fi
            sleep 15
          done
          echo "Timed out waiting for merge; Deploy not dispatched (workflow_dispatch fallback available)"
