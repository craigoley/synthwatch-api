name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (warnings as errors)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      # Code-quality gate: .NET analyzers (latest-recommended) with warnings as errors,
      # the fleet's zero-warning bar for this C# repo.
      - name: Build
        run: dotnet build -c Release --no-restore -warnaserror
