name: Self-heal

# ───────────────────────────────────────────────────────────────────────────────────────────
# When CI (the "CI gate" aggregate) concludes FAILURE on a trusted author's open PR to main, invoke
# Claude INLINE to diagnose and push ONE candidate fix. No "@claude" comment round-trip: a comment
# authored by github-actions[bot] (the default GITHUB_TOKEN) fires NO workflow — GitHub suppresses
# triggering events from that token. workflow_run runs from the DEFAULT branch's definition and has
# secret access, so claude-code-action runs directly with CLAUDE_CODE_OAUTH_TOKEN.
#
# ★ THREE HARD-STOP GUARDRAILS (a self-healing merge loop is the machine that shipped CA1305 to red main):
#   1. ONE attempt per PR. If the branch already carries a [self-heal] commit, STOP + ping. Never retry.
#   2. NEVER weaken a check. After Claude pushes, a mechanical diff-scan REVERTS the push + pings if the
#      change adds a suppression/ignore/pragma/test-skip, edits a fixture/snapshot/golden, or touches
#      .github/**. The suppression never survives — enforced in code, not just asked of the model.
#   3. NEVER auto-fix a cross-repo PARITY gate. If a parity check is among the failures, CALLOUT ONLY —
#      Claude is never invoked (a red parity gate may be a CORRECT signal that two repos diverged).
#
# ★ CLOSURE CAVEAT: Claude pushes via github.token, whose push GitHub does NOT allow to re-trigger
# pull_request CI. So even a good fix will not auto-re-run checks / auto-merge until a human nudges the
# branch (Update branch / empty commit) OR the Claude GitHub App / a PAT is installed so the push is
# authored by a triggering identity. The success comment says exactly this.
# ───────────────────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["CI gate"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: self-heal-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  heal:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      TRUSTED: '["craigoley","cao825","craigoleyagent","dependabot[bot]"]'
      # Union of cross-repo parity gates across the fleet (harmless to list names absent in a given repo).
      # A failing check whose name matches any of these -> CALLOUT ONLY (guardrail 3).
      PARITY: 'Trace-signals golden parity|Schema parity|Runner column parity|Grant coverage|Lib-flow parity|Enum coverage'
      # Never a heal target / never counted as a failure to fix.
      IGNORE_RE: 'ci-gate|automerge|Auto-merge|Enable auto-merge'
    steps:
      - name: Resolve PR + trust/eligibility gate
        id: pr
        run: |
          set -euo pipefail
          PR=$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")
          if [ -z "$PR" ]; then
            PR=$(gh pr list --repo "$REPO" --head "$HEAD_BRANCH" --state open --json number --jq '.[0].number // empty')
          fi
          if [ -z "$PR" ]; then echo "No open PR for $HEAD_BRANCH — nothing to heal."; echo "skip=true" >>"$GITHUB_OUTPUT"; exit 0; fi
          J=$(gh pr view "$PR" --repo "$REPO" --json state,isDraft,baseRefName,author,headRefName,headRefOid)
          state=$(jq -r .state <<<"$J"); draft=$(jq -r .isDraft <<<"$J"); base=$(jq -r .baseRefName <<<"$J")
          author=$(jq -r .author.login <<<"$J"); headref=$(jq -r .headRefName <<<"$J"); headoid=$(jq -r .headRefOid <<<"$J")
          echo "PR #$PR author=$author state=$state draft=$draft base=$base head=$headoid"
          if [ "$state" != "OPEN" ] || [ "$draft" = "true" ] || [ "$base" != "main" ] \
             || ! jq -e --arg a "$author" 'index($a)' <<<"$TRUSTED" >/dev/null; then
            echo "Not eligible (closed/draft/non-main-base/untrusted) — no heal."; echo "skip=true" >>"$GITHUB_OUTPUT"; exit 0
          fi
          echo "pr=$PR"        >>"$GITHUB_OUTPUT"
          echo "headref=$headref" >>"$GITHUB_OUTPUT"
          echo "headoid=$headoid" >>"$GITHUB_OUTPUT"
          echo "skip=false"    >>"$GITHUB_OUTPUT"

      - name: Guardrail 1 — one attempt per PR
        id: g1
        if: steps.pr.outputs.skip != 'true'
        run: |
          set -euo pipefail
          PR=${{ steps.pr.outputs.pr }}
          MARK=$(gh pr view "$PR" --repo "$REPO" --json commits \
            --jq '[.commits[].messageHeadline] | map(select(test("\\[self-heal\\]"))) | length')
          if [ "${MARK:-0}" != "0" ]; then
            gh pr comment "$PR" --repo "$REPO" --body "🛑 **Self-heal stopped (guardrail 1: one attempt).** CI is still red after a prior automated fix on this branch — not retrying. This needs a human. @craigoley"
            echo "stop=true" >>"$GITHUB_OUTPUT"; exit 0
          fi
          echo "stop=false" >>"$GITHUB_OUTPUT"

      - name: Identify failing checks
        id: fails
        if: steps.pr.outputs.skip != 'true' && steps.g1.outputs.stop != 'true'
        run: |
          set -euo pipefail
          runs=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs?per_page=100" --paginate --slurp \
                 | jq -c '[.[].check_runs[] | {name, conclusion}]')
          fails=$(jq -r --arg ig "$IGNORE_RE" '
            .[] | select(.conclusion|IN("failure","timed_out","cancelled","action_required","startup_failure"))
                | select(.name|test($ig)|not) | .name' <<<"$runs" | sort -u)
          echo "failing checks:"; printf '%s\n' "$fails" | sed 's/^/  - /'
          if [ -z "$fails" ]; then echo "none=true" >>"$GITHUB_OUTPUT"; else echo "none=false" >>"$GITHUB_OUTPUT"; fi
          { echo "list<<HEALEOF"; printf '%s\n' "$fails"; echo "HEALEOF"; } >>"$GITHUB_OUTPUT"

      - name: Guardrail 3 — a parity gate is CALLOUT-ONLY
        id: g3
        if: steps.pr.outputs.skip != 'true' && steps.g1.outputs.stop != 'true' && steps.fails.outputs.none != 'true'
        run: |
          set -euo pipefail
          PR=${{ steps.pr.outputs.pr }}
          HIT=$(printf '%s\n' "${{ steps.fails.outputs.list }}" | grep -E "$PARITY" || true)
          if [ -n "$HIT" ]; then
            BODY=$(printf '🛑 **Self-heal will NOT auto-fix a cross-repo parity gate.**\n\nRed parity check(s):\n%s\n\nA red parity gate may be CORRECT — it means two repos genuinely diverged. Auto-regenerating a fixture would destroy the exact signal it exists to raise. Human review required. @craigoley' "$(printf '%s\n' "$HIT" | sed 's/^/- /')")
            gh pr comment "$PR" --repo "$REPO" --body "$BODY"
            echo "stop=true" >>"$GITHUB_OUTPUT"; exit 0
          fi
          echo "stop=false" >>"$GITHUB_OUTPUT"

      - name: Checkout PR head (pinned SHA)
        if: steps.pr.outputs.skip != 'true' && steps.g1.outputs.stop != 'true' && steps.fails.outputs.none != 'true' && steps.g3.outputs.stop != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.headoid }}
          fetch-depth: 0

      - name: Claude — diagnose + push ONE candidate fix
        if: steps.pr.outputs.skip != 'true' && steps.g1.outputs.stop != 'true' && steps.fails.outputs.none != 'true' && steps.g3.outputs.stop != 'true'
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342  # v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR: ${{ steps.pr.outputs.pr }}
            BRANCH: ${{ steps.pr.outputs.headref }}
            FAILING CHECKS:
            ${{ steps.fails.outputs.list }}

            CI failed on this PR. Diagnose and fix the ROOT CAUSE so the failing checks pass. To read the
            real error, run:
              gh run list --repo ${{ github.repository }} --commit ${{ github.event.workflow_run.head_sha }} --json databaseId,name,conclusion
              gh run view <id> --repo ${{ github.repository }} --log-failed

            ★ ABSOLUTE PROHIBITIONS. If the only way you can make a check pass is any of the following, DO NOT
              do it — make NO code change, post a PR comment explaining why and tagging @craigoley, and STOP:
              - adding/broadening a suppression or ignore: eslint-disable, @ts-ignore, @ts-expect-error,
                "// nolint", "# type: ignore", "#pragma warning disable", [SuppressMessage], <NoWarn>,
                an .editorconfig severity downgrade
              - loosening or deleting an assertion, or skipping/deleting a test (it.skip, describe.skip, xit,
                test.skip, [Fact(Skip=...)], [Ignore])
              - editing or regenerating a TEST FIXTURE / snapshot / golden file
              - editing ANY file under .github/ or any branch-protection / workflow config
            Fix the actual defect in the product code. If the failure is legitimate and the code is correct
            (the TEST is wrong, or two repos genuinely diverged), it is NOT yours to auto-fix: comment and STOP.

            When you have a REAL fix: run the relevant build/test locally to confirm green, then commit to THIS
            branch with a message beginning exactly "[self-heal] " and push. Do NOT merge. Do NOT open a new PR.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 40
            --allowedTools "Edit,Write,Read,Bash(git:*),Bash(gh pr:*),Bash(gh api:*),Bash(gh run:*),Bash(npm:*),Bash(npx:*),Bash(pnpm:*),Bash(dotnet:*)"

      - name: Guardrail 2 — reject a weakening/fixture/workflow fix (revert + ping)
        if: steps.pr.outputs.skip != 'true' && steps.g1.outputs.stop != 'true' && steps.fails.outputs.none != 'true' && steps.g3.outputs.stop != 'true'
        run: |
          set -euo pipefail
          PR=${{ steps.pr.outputs.pr }}
          git fetch origin "$HEAD_BRANCH"
          NEWOID=$(git rev-parse origin/"$HEAD_BRANCH")
          if [ "$NEWOID" = "$HEAD_SHA" ]; then
            echo "Claude pushed nothing (it declined or found no safe fix). Its own comment (if any) stands."
            exit 0
          fi
          NAMES=$(git diff --name-only "$HEAD_SHA".."$NEWOID")
          DIFF=$(git diff "$HEAD_SHA".."$NEWOID")
          BAD=""
          printf '%s\n' "$NAMES" | grep -qE '(^|/)\.github/' && BAD="$BAD\n- touches .github/ (workflow / CI config)"
          printf '%s\n' "$NAMES" | grep -qiE 'fixture|__snapshots__|\.snap$|golden|/schema\.sql$' && BAD="$BAD\n- edits a fixture / snapshot / golden file"
          printf '%s\n' "$DIFF"  | grep -qE '^\+.*(eslint-disable|@ts-ignore|@ts-expect-error|// *nolint|# *type: *ignore|#pragma warning disable|SuppressMessage|<NoWarn>|NoWarn>|\bit\.skip\b|\bdescribe\.skip\b|\bxit\b|\btest\.skip\b|Fact\(Skip|\[Ignore\])' && BAD="$BAD\n- adds a suppression / skips a test / loosens a check"
          if [ -n "$BAD" ]; then
            git push --force origin "$HEAD_SHA:refs/heads/$HEAD_BRANCH"
            gh pr comment "$PR" --repo "$REPO" --body "$(printf '🛑 **Self-heal REVERTED (guardrail 2: never weaken a check).** The automated fix would have:%b\n\nThat manufactures a green light wired to nothing, so it was force-reverted to %s. A human fix is required. @craigoley' "$BAD" "$HEAD_SHA")"
            exit 0
          fi
          gh pr comment "$PR" --repo "$REPO" --body "🤖 **Self-heal pushed a candidate fix** for: ${{ steps.fails.outputs.list }}. ⚠️ CI will NOT auto-re-run — the push is by github-actions[bot], whose events GitHub suppresses. Click **Update branch** or push an empty commit to re-run; it will auto-merge on green. (Installing the Claude GitHub App or a PAT would close this hands-off.)"
