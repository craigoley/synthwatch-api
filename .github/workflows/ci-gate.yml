name: CI gate

# ──────────────────────────────────────────────────────────────────────────────────────────
# ci-gate — ONE always-reporting required status check that aggregates the PR's other checks.
# Fleet pattern, proven first in craigoley/synthwatch (#110).
#
# WHY: a required status check that gets SKIPPED can permanently deadlock a merge. In synthwatch
# a Dependabot PR sat BLOCKED forever because a required REUSABLE-workflow check was `if:`-skipped
# on Dependabot PRs — a skipped reusable caller creates NO check run with that nested context
# name, so branch protection waits for "Expected" forever. (A skipped DIRECT job reports a
# `skipped` check run, which GitHub counts as satisfied.) CLASS bug: ANY required check that can
# be skipped (job `if:`, path filter, reusable caller) can deadlock a merge.
#
# THIS REPO's required checks (`Test …`, `Claude review`) currently always register, so ci-gate
# here is PREVENTIVE + fleet-consistency: it immunises the repo if a skippable/reusable/path-
# filtered required check is ever added. Branch protection should require ONLY `ci-gate`; the
# existing jobs keep running + reporting. That admin flip is Craig's — see the PR.
#
# HOW: ci-gate ALWAYS runs (no `if:`/path filter) so its context ALWAYS reports, and it FAILS
# ONLY when a sibling check actually FAILED. It reads the PR head commit's check runs across all
# workflows (the textbook `needs:` aggregator only works within ONE workflow), waits for the
# always-present required check(s) to be terminal (registration-race safety), then fails iff any
# check (excluding ci-gate + the auto-merge job) concluded a real failure. Skipped/absent
# siblings never block. ★ Note: this makes ALL of the repo's checks effectively gating (a
# semgrep/codeql/etc. failure fails ci-gate) — stricter than the prior 2-context requirement,
# which is intended (more enforcement via one stable gate).
# ★ THE RULE (what gates) — branch protection requires ONLY `ci-gate`, so ci-gate IS the merge gate:
#   • EVERY check present on the PR head GATES: it must reach a TERMINAL state and not have failed.
#     That includes the SLOW ones (CodeQL / code-scanning / Stryker mutation / dependency scan) — the
#     gate now WAITS for them. Previously it judged the snapshot taken the moment REQUIRED went terminal,
#     so a slower check still in_progress had conclusion=null, was never counted, and could fail AFTER
#     ci-gate had already passed. Branch protection required only ci-gate, so that merged.
#   • EXTERNAL checks representing a real BUILD/DEPLOY outcome GATE; notification/comment bots do NOT.
#   • ADVISORY (declared below) never waits, never blocks — only for checks that are advisory BY THEIR
#     OWN WORKFLOW'S DESIGN, and notification bots.
#   • ORCHESTRATION (ci-gate/auto-merge/heal) NEVER waits — waiting is a DEADLOCK: self-heal's `heal`
#     polls "waiting for ci-gate to conclude", so a mutual wait spins both to timeout and blocks EVERY PR.
#   • An UNCLASSIFIED check GATES by default (fail-safe): a new check must be explicitly declared
#     advisory to stop blocking.
#   The logic lives in scripts/ci-gate-eval.sh and is SELF-TESTED by this job on every PR.
#
# ──────────────────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main]

permissions:
  checks: read
  contents: read

concurrency:
  group: ci-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      SHA: ${{ github.event.pull_request.head.sha }}
      # REQUIRED — must additionally REGISTER (fail-closed: a required check that never registers ->
      # timeout -> ci-gate FAILS; never a silent pass). Everything else present gates too (the rule above)
      # — including "Analyze (csharp)"/CodeQL, `stryker` (the mutation gate) and the dependency scan,
      # which the old snapshot logic silently skipped.
      REQUIRED: >-
        ["Test (xUnit + Testcontainers Postgres)","Claude review","Trace-signals golden parity","Schema parity (fixture vs runner migrations)","Runner column parity (fixture vs runner schema)","Build (warnings as errors)","Grant coverage (MI roles vs Bicep)","Grant coverage (Postgres table grants)"]
      # ADVISORY — never waited for, never blocks. Advisory BY ITS OWN WORKFLOW'S DESIGN:
      #   "Scan" — semgrep.yml: `continue-on-error: true` — the job can never go red. (It is NOT in
      #            REQUIRED here, so unlike the runner this repo never claimed it gated; it is declared
      #            advisory so the "everything else gates" rule above is exactly true.) Semgrep findings
      #            surface as code-scanning alerts.
      ADVISORY: >-
        ["Scan"]
      # ORCHESTRATION — never waited for, never blocks: ci-gate's own plumbing.
      # ★ DEADLOCK GUARD: self-heal's `heal` job polls "waiting for ci-gate to conclude" — if ci-gate
      #   waited for heal, both spin to their timeouts and EVERY PR blocks.
      # ★ Deliberate that a FAILED heal/auto-merge cannot block a good PR: self-heal is a remediation
      #   bot (it reported FAILURE on every run while the #313 OIDC bug was live), and the auto-merge
      #   job fails benignly on a draft PR.
      ORCHESTRATION: >-
        ["ci-gate","Auto-merge (trusted authors)","heal"]
    steps:
      - name: Checkout (for scripts/ci-gate-eval.sh — the gate's decision logic)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # ★ The gate SELF-TESTS its own logic before using it: a regression that would silently WIDEN the
      #   merge gate (or re-introduce the heal deadlock) fails ci-gate loudly on every PR — no new check
      #   name, no new workflow, and the guard can never rot unnoticed.
      - name: Self-test the gate logic (must-go-red anchor + deadlock guard)
        run: bash scripts/ci-gate-eval.sh --self-test

      - name: Aggregate sibling check results (wait for ALL gating checks; fail only on a REAL failure)
        run: |
          set -euo pipefail
          # shellcheck source=scripts/ci-gate-eval.sh
          source scripts/ci-gate-eval.sh

          runs_json() {
            # All check runs on the PR head SHA, across every workflow + app, merged across pages.
            # (`--slurp` can't combine with `-q`, so flatten the page array with a separate jq.)
            gh api "repos/${REPO}/commits/${SHA}/check-runs?per_page=100" --paginate --slurp \
              | jq -c '[ .[].check_runs[] | {name, status, conclusion} ]'
          }

          # 1) WAIT until every REQUIRED check is present+completed AND every PRESENT gating check is
          #    terminal. One deadline bounds both, so a hung check is a VISIBLE timeout — never an
          #    invisible pass.
          settled=0
          deadline=$(( $(date +%s) + 900 ))   # 15-minute hard cap
          while :; do
            runs="$(runs_json)"
            not_ready="$(ci_gate_not_ready "${runs}" "${REQUIRED}" "${ADVISORY}" "${ORCHESTRATION}")"
            if [ -z "${not_ready}" ]; then
              # SETTLE PASS: the code-scanning checks (CodeQL / "Semgrep OSS") are minted by the SARIF
              # upload a few SECONDS AFTER their Analyze job goes terminal. Re-poll once so a late
              # registrant cannot slip in behind the gate — the same race, one level down.
              [ "${settled}" = "1" ] && break
              settled=1
              echo "all gating checks terminal — settling (re-poll in 20s to catch late registrants)"
              sleep 20
              continue
            fi
            settled=0
            if [ "$(date +%s)" -ge "${deadline}" ]; then
              echo "::error::ci-gate: timed out waiting for check(s) to reach a terminal state:"
              printf '%s\n' "${not_ready}" | sed 's/^/  - /'
              exit 1
            fi
            echo "waiting for check(s) to complete:"
            printf '%s\n' "${not_ready}" | sed 's/^/  - /'
            sleep 15
          done

          # 2) FAIL if ANY gating check concluded in a real failure. Skipped / neutral / success all
          #    pass — so a skipped sibling never deadlocks the merge.
          echo "--- gated check runs ---"
          printf '%s' "${runs}" | jq -r '.[] | "  \(.conclusion // .status)\t\(.name)"' | sort

          fails="$(ci_gate_failures "${runs}" "${ADVISORY}" "${ORCHESTRATION}")"
          if [ -n "${fails}" ]; then
            echo "::error::ci-gate: check(s) FAILED — holding merge:"
            printf '%s\n' "${fails}" | sed 's/^/  - /'
            exit 1
          fi
          echo "ci-gate: every gating check terminal, no failures — merge may proceed."
