name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, off-peak: Mondays 04:32 UTC.
    - cron: '32 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # C# requires a build. autobuild on a brand-new .NET 10 major is uncertain on
          # GitHub-hosted runners (SDK may be absent), so we use manual build-mode with an
          # explicit setup-dotnet + dotnet build — deterministic and matches local CI.
          - language: csharp
            build-mode: manual
          - language: actions
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # config-file carries the query suite + paths-ignore (excludes obj/ generated code).
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build (manual)
        if: matrix.build-mode == 'manual'
        run: dotnet build -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: "/language:${{ matrix.language }}"
          # Don't upload yet — first FILTER generated-code results (next step). For COMPILED languages
          # (C#), config `paths-ignore` does NOT drop generated files: the manual build compiles
          # obj/.../*.g.cs (Azure Functions Worker SDK + regex source generator), so CodeQL extracts +
          # flags them regardless. Filtering the SARIF by result location is what actually works here.
          output: sarif-results
          upload: false

      - name: Filter generated-code results out of the SARIF
        uses: advanced-security/filter-sarif@2da736ff05ef065cb2894ac6892e47b5eac2c3c0 # v1.1
        with:
          # Exclusion-only (leading '-') → KEEP all results except those in generated output. Scoped
          # TIGHTLY to obj/ build output + any *.g.cs; hand-written source (Functions/, Infrastructure/,
          # Data/, Dtos/) has neither, so real findings still surface.
          patterns: |
            -**/obj/**
            -**/*.g.cs
          input: sarif-results/${{ matrix.language }}.sarif
          output: sarif-results/${{ matrix.language }}.sarif

      - name: Upload filtered SARIF
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: sarif-results/${{ matrix.language }}.sarif
          category: "/language:${{ matrix.language }}"
