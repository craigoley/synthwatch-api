name: "SynthWatch API CodeQL config"

# Run the security-and-quality suite (kept here so the workflow has a single source of config).
queries:
  - uses: security-and-quality

# Exclude build output / source-generator output. ★ paths-ignore does NOT work for COMPILED languages
# (C#): the manual build compiles obj/.../*.g.cs (Functions Worker SDK + regex source generator), so the
# CodeQL extractor sees them regardless of these globs — they kept surfacing (cs/dereferenced-value-may-
# be-null in GeneratedFunctionExecutor.g.cs; cs/useless-assignment + cs/useless-cast in RegexGenerator.g.cs).
# The ACTUAL fix lives in the workflow: a post-analysis advanced-security/filter-sarif step drops generated-
# file RESULTS (by location) before upload. These globs are kept as belt-and-suspenders (they DO apply to
# interpreted languages, e.g. the 'actions' analysis). Hand-written code (Functions/, Data/, Dtos/,
# Infrastructure/) is always analyzed.
paths-ignore:
  - '**/obj/**'
  - '**/bin/**'
  - '**/*.g.cs'
